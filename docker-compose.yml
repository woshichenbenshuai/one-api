services:
  one-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: one-api-local:latest
    container_name: one-api
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./data/oneapi:/data
      - ./logs:/app/logs
    environment:
      - PORT=${PORT:-3000}
      - TZ=${TZ:-Asia/Shanghai}
      - SQL_DSN=${SQL_DSN:?SQL_DSN is required}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:-redis://redis:6379}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - INITIAL_ROOT_USERNAME=${INITIAL_ROOT_USERNAME:?INITIAL_ROOT_USERNAME is required}
      - INITIAL_ROOT_PASSWORD=${INITIAL_ROOT_PASSWORD:?INITIAL_ROOT_PASSWORD is required}
      - INITIAL_ROOT_DISPLAY_NAME=${INITIAL_ROOT_DISPLAY_NAME:-Root User}
      - INITIAL_ROOT_AUTHENTICATOR_SECRET=${INITIAL_ROOT_AUTHENTICATOR_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:${PORT:-3000}/api/status | grep -q '\"success\":true'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: "${REGISTRY:-docker.io}/redis:latest"
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: "${REGISTRY:-docker.io}/mysql:8.2.0"
    container_name: mysql
    restart: unless-stopped
    volumes:
      - ./data/mysql:/var/lib/mysql
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
